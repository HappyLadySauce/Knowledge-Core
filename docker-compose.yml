services:
  postgres:
    image: postgres:16
    container_name: knowledge-core-postgres
    environment:
      POSTGRES_USER: knowledge_core
      POSTGRES_PASSWORD: knowledge_core
      POSTGRES_DB: knowledge_core
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge_core -d knowledge_core"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - knowledge-core-postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: knowledge-core-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - knowledge-core-redis-data:/data

volumes:
  knowledge-core-postgres-data:
  knowledge-core-redis-data:
